services:
  - type: web
    name: forgeconvert
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # Render dashboard lo manually set cheyyandi
    disk:
      name: tmp-storage
      mountPath: /tmp
      sizeGB: 1

