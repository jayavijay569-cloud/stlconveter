services:
  - type: web
    name: forgeconvert
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -i https://gmsh.info/python-packages-dev-nox --force-reinstall --no-cache-dir gmsh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
